services:
  mysql:
    image: mariadb:10.11
    container_name: ${DB_CONTAINER_NAME:-${COMPOSE_PROJECT_NAME:-payment}-mysql}
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Taipei
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - payment-net

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME:-${COMPOSE_PROJECT_NAME:-payment}-api}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      MOCK_PROVIDER_ENABLED: ${MOCK_PROVIDER_ENABLED:-false}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME}
      ADMIN_INITIAL_PASSWORD_HASH: ${ADMIN_INITIAL_PASSWORD_HASH}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS}
      ADMIN_COOKIE_DOMAIN: ${ADMIN_COOKIE_DOMAIN}
      ADMIN_COOKIE_SAME_SITE: ${ADMIN_COOKIE_SAME_SITE}
      RECEIPT_STORAGE_PATH: ${RECEIPT_STORAGE_PATH}
      RECEIPT_MAX_SIZE_MB: ${RECEIPT_MAX_SIZE_MB}
      CALLBACK_WORKER_INTERVAL: ${CALLBACK_WORKER_INTERVAL}
      CALLBACK_MAX_ATTEMPTS: ${CALLBACK_MAX_ATTEMPTS}
      CALLBACK_TIMEOUT_SECONDS: ${CALLBACK_TIMEOUT_SECONDS}
      MERCHANT_SECRET_ENCRYPTION_KEY: ${MERCHANT_SECRET_ENCRYPTION_KEY}
      DATABASE_DSN: ${DATABASE_DSN}
      NEWEBPAY_MPG_URL: ${NEWEBPAY_MPG_URL}
      NEWEBPAY_ENV: ${NEWEBPAY_ENV}
      NEWEBPAY_MERCHANT_ID: ${NEWEBPAY_MERCHANT_ID}
      NEWEBPAY_HASH_KEY: ${NEWEBPAY_HASH_KEY}
      NEWEBPAY_HASH_IV: ${NEWEBPAY_HASH_IV}
      NEWEBPAY_NOTIFY_URL: ${NEWEBPAY_NOTIFY_URL}
      NEWEBPAY_RETURN_URL: ${NEWEBPAY_RETURN_URL}
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL}
      GATEWAY_CUSTOMER_ID: ${GATEWAY_CUSTOMER_ID}
      GATEWAY_HMAC_SECRET: ${GATEWAY_HMAC_SECRET}
      GATEWAY_PREVIOUS_HMAC_SECRET: ${GATEWAY_PREVIOUS_HMAC_SECRET}
      GATEWAY_PAYOUT_NOTIFY_URL: ${GATEWAY_PAYOUT_NOTIFY_URL}
      GATEWAY_DEPOSIT_CALLBACK_ALLOWLIST: ${GATEWAY_DEPOSIT_CALLBACK_ALLOWLIST}
      GATEWAY_PAYOUT_CALLBACK_ALLOWLIST: ${GATEWAY_PAYOUT_CALLBACK_ALLOWLIST}
      GATEWAY_MAX_SKEW_SECONDS: ${GATEWAY_MAX_SKEW_SECONDS}
      GATEWAY_HTTP_TIMEOUT_SECONDS: ${GATEWAY_HTTP_TIMEOUT_SECONDS}
      MERCHANT_CODE: ${MERCHANT_CODE}
      MERCHANT_NAME: ${MERCHANT_NAME}
      MERCHANT_API_KEY: ${MERCHANT_API_KEY}
      MERCHANT_CALLBACK_SIGNING_KEY_ID: ${MERCHANT_CALLBACK_SIGNING_KEY_ID}
      MERCHANT_CALLBACK_SIGNING_SECRET: ${MERCHANT_CALLBACK_SIGNING_SECRET}
      MERCHANT_CALLBACK_URL: ${MERCHANT_CALLBACK_URL}
      MERCHANT_INITIAL_BALANCE_TWD: ${MERCHANT_INITIAL_BALANCE_TWD}
      PAYOUT_REVIEW_TOKEN: ${PAYOUT_REVIEW_TOKEN}
      PAYOUT_REVIEW_ACTOR_ALLOWLIST: ${PAYOUT_REVIEW_ACTOR_ALLOWLIST}
      PAYOUT_REVIEW_ACTOR_ROLES: ${PAYOUT_REVIEW_ACTOR_ROLES}
      APP_TRUSTED_PROXY_CIDRS: ${APP_TRUSTED_PROXY_CIDRS}
      APP_READ_HEADER_TIMEOUT_SECONDS: ${APP_READ_HEADER_TIMEOUT_SECONDS}
      APP_READ_TIMEOUT_SECONDS: ${APP_READ_TIMEOUT_SECONDS}
      APP_WRITE_TIMEOUT_SECONDS: ${APP_WRITE_TIMEOUT_SECONDS}
      APP_IDLE_TIMEOUT_SECONDS: ${APP_IDLE_TIMEOUT_SECONDS}
      APP_SHUTDOWN_TIMEOUT_SECONDS: ${APP_SHUTDOWN_TIMEOUT_SECONDS}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
      ALERT_WEBHOOK_TIMEOUT_SECONDS: ${ALERT_WEBHOOK_TIMEOUT_SECONDS}
      WORKER_LEASE_SECONDS: ${WORKER_LEASE_SECONDS}
      TEST_DEPOSIT_CALLBACKS_ENABLED: ${TEST_DEPOSIT_CALLBACKS_ENABLED:-false}
      HMAC_DIAGNOSTICS_ENABLED: ${HMAC_DIAGNOSTICS_ENABLED:-false}
    volumes:
      - receipt-data:/var/lib/payment-service/receipts
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_HOST_PORT:-8080}:8080"
    networks:
      - payment-net

  payment-admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: ${ADMIN_CONTAINER_NAME:-${COMPOSE_PROJECT_NAME:-payment}-admin}
    restart: unless-stopped
    depends_on:
      payment-api:
        condition: service_started
    ports:
      - "${ADMIN_BIND_HOST:-127.0.0.1}:${ADMIN_HOST_PORT:-8081}:80"
    networks:
      - payment-net

networks:
  payment-net:
    name: ${PAYMENT_NETWORK_NAME:-${COMPOSE_PROJECT_NAME:-payment}-network}
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1

volumes:
  mysql-data:
    name: ${MYSQL_VOLUME_NAME:-${COMPOSE_PROJECT_NAME:-payment}-mysql-data}
  receipt-data:
    name: ${RECEIPT_VOLUME_NAME:-${COMPOSE_PROJECT_NAME:-payment}-receipt-data}
