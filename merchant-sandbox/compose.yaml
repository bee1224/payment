services:
  merchant-sandbox:
    build: .
    environment:
      PAYMENT_SANDBOX_BASE_URL: ${PAYMENT_SANDBOX_BASE_URL:-}
      PAYMENT_CUSTOMER_ID: ${PAYMENT_CUSTOMER_ID:-}
      PAYMENT_CUSTOMER_SECRET: ${PAYMENT_CUSTOMER_SECRET:-}
      PAYMENT_MERCHANT_ID: ${PAYMENT_MERCHANT_ID:-}
      PAYMENT_MERCHANT_SECRET: ${PAYMENT_MERCHANT_SECRET:-}
      PAYMENT_API_KEY: ${PAYMENT_API_KEY:-}
      MERCHANT_SANDBOX_CALLBACK_KEY_ID: ${MERCHANT_SANDBOX_CALLBACK_KEY_ID:-}
      MERCHANT_SANDBOX_CALLBACK_SIGNING_SECRET: ${MERCHANT_SANDBOX_CALLBACK_SIGNING_SECRET:-}
      MERCHANT_SANDBOX_LISTEN_ADDR: ${MERCHANT_SANDBOX_LISTEN_ADDR:-:8281}
      MERCHANT_SANDBOX_CALLBACK_PATH: ${MERCHANT_SANDBOX_CALLBACK_PATH:-/callbacks/payment}
      MERCHANT_SANDBOX_CALLBACK_RESPONSE_MODE: ${MERCHANT_SANDBOX_CALLBACK_RESPONSE_MODE:-success}
      MERCHANT_SANDBOX_TIMEOUT_DELAY: ${MERCHANT_SANDBOX_TIMEOUT_DELAY:-35s}
      MERCHANT_SANDBOX_RECORDS_PATH: /app/var/callback-records.jsonl
    ports:
      - "${MERCHANT_SANDBOX_HOST_ADDR:-127.0.0.1}:${MERCHANT_SANDBOX_HOST_PORT:-8281}:${MERCHANT_SANDBOX_CONTAINER_PORT:-8281}"
    volumes:
      - ./var:/app/var
    restart: unless-stopped
