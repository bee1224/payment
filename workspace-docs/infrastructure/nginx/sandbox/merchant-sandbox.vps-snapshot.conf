server {
    server_name merchant-sandbox.nnviopp.com;

    client_max_body_size 1m;

    location = /healthz {
        proxy_pass http://127.0.0.1:8281;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_send_timeout 45s;
        proxy_read_timeout 45s;
        add_header Cache-Control "no-store" always;
    }

    location = /callbacks/payment {
        proxy_pass http://127.0.0.1:8281;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_send_timeout 45s;
        proxy_read_timeout 45s;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/merchant-sandbox.nnviopp.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/merchant-sandbox.nnviopp.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = merchant-sandbox.nnviopp.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name merchant-sandbox.nnviopp.com;
    return 404; # managed by Certbot


}