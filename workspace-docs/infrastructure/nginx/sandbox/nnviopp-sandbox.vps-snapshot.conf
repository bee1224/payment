server {
 listen 159.198.42.146:80;
 server_name sandbox-api.nnviopp.com;
 client_max_body_size 20m;
 access_log /var/log/nginx/nnviopp-sandbox-api-access.log;
 error_log /var/log/nginx/nnviopp-sandbox-api-error.log warn;
 location /.well-known/acme-challenge/ { root /var/www/certbot; }
 location / { proxy_pass http://127.0.0.1:8181; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; proxy_set_header X-Request-ID $request_id; proxy_read_timeout 60s; proxy_connect_timeout 10s; proxy_send_timeout 60s; add_header Cache-Control "no-store" always; }
}
server {
 listen 159.198.42.146:80;
 server_name sandbox.nnviopp.com;
 access_log /var/log/nginx/nnviopp-sandbox-admin-access.log;
 error_log /var/log/nginx/nnviopp-sandbox-admin-error.log warn;
 location /.well-known/acme-challenge/ { root /var/www/certbot; }
 location / { proxy_pass http://127.0.0.1:8183; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; add_header Cache-Control "no-store" always; }
}
server {
    listen 159.198.42.146:443 ssl http2;
    server_name sandbox-api.nnviopp.com;
    ssl_certificate /etc/letsencrypt/live/sandbox-api.nnviopp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sandbox-api.nnviopp.com/privkey.pem;
    client_max_body_size 20m;
    access_log /var/log/nginx/nnviopp-sandbox-api-access.log;
    error_log /var/log/nginx/nnviopp-sandbox-api-error.log warn;
    location / {
        proxy_pass http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        add_header Cache-Control "no-store" always;
    }
}

server {
    listen 159.198.42.146:443 ssl http2;
    server_name sandbox.nnviopp.com;
    ssl_certificate /etc/letsencrypt/live/sandbox-api.nnviopp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sandbox-api.nnviopp.com/privkey.pem;
    access_log /var/log/nginx/nnviopp-sandbox-admin-access.log;
    error_log /var/log/nginx/nnviopp-sandbox-admin-error.log warn;
    location / {
        proxy_pass http://127.0.0.1:8183;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }
}
